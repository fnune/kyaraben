# Kyaraben version pinning
# To compute hashes: nix-prefetch-url <url> && nix hash convert --to sri --hash-algo sha256 <hash>

[nixpkgs]
commit = "fa83fd837f3098e3e678e6cf017b2b36102c7211" # https://github.com/NixOS/nixpkgs/commits/nixos-25.11

# RetroArch cores bundle from buildbot (same source as RetroArch itself)
# Contains all cores in one archive, we extract only what we need
[retroarch-cores]
url_template = "https://buildbot.libretro.com/stable/{version}/linux/{arch}/RetroArch_cores.7z"
default = "1.22.2"

[retroarch-cores."1.22.2".targets.x86_64]
arch = "x86_64"
sha256 = "sha256-S37Y3JfUvwNfzhgsZLVljHZi4unl1CEpU4r71LYJYwc="

# Core filenames inside the archive (used to extract only what we need)
# Format: core_name = "filename_in_archive"
[retroarch-cores.files]
bsnes = "bsnes_libretro.so"
mesen = "mesen_libretro.so"
genesis_plus_gx = "genesis_plus_gx_libretro.so"
mupen64plus = "mupen64plus_next_libretro.so"
beetle_saturn = "mednafen_saturn_libretro.so"

# Core sizes in bytes (for progress indication)
[retroarch-cores.sizes]
bsnes = 6362240
mesen = 3783048
genesis_plus_gx = 12729616
mupen64plus_next = 8725856
mednafen_saturn = 8316472

