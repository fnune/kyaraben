version: 2

builds:
  - main: ./cmd/kyaraben
    binary: kyaraben
    goos:
      - linux
    goarch:
      - amd64

archives:
  - formats: [tar.gz]
    name_template: "kyaraben-cli-{{ .Version }}-linux-amd64"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  draft: true
