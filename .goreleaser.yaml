version: 2

builds:
  - main: ./cmd/kyaraben
    binary: kyaraben
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=musl-gcc
    ldflags:
      - -s -w
      - -linkmode external
      - -extldflags '-static'

archives:
  - formats: [binary]
    name_template: "Kyaraben-CLI-linux-amd64"

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  draft: true
