version: 2

builds:
  - main: ./cmd/kyaraben
    binary: kyaraben
    goos:
      - linux
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=musl-gcc
    ldflags:
      - -s -w
      - -linkmode external
      - -extldflags '-static'

archives:
  - formats: [binary]
    name_template: "Kyaraben-CLI-linux-amd64"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  draft: true
  header: |
    See [CHANGELOG.md](https://github.com/fnune/kyaraben/blob/main/CHANGELOG.md) for details.
