name: Deploy relay

on:
  push:
    branches: [main]
    paths:
      - "relay/**/*.go"
      - "relay/go.mod"
      - "relay/go.sum"
      - "relay/Containerfile"
      - "relay/scripts/deploy.sh"
      - ".github/workflows/deploy-relay.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Koyeb CLI
        run: curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/main/install.sh | bash

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: ./relay/scripts/deploy.sh
