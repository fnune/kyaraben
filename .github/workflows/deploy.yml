name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Koyeb CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/koyeb/koyeb-cli/releases/latest | jq -r .tag_name | sed 's/^v//')
          curl -fsSL "https://github.com/koyeb/koyeb-cli/releases/download/v${VERSION}/koyeb-cli_${VERSION}_linux_amd64.tar.gz" | tar xz
          sudo mv koyeb /usr/local/bin/

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: ./deploy/scripts/deploy.sh
