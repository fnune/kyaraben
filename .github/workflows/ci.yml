name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Build CLI binary for E2E tests
        run: go build -o ./kyaraben ./cmd/kyaraben

      - name: Test
        run: go test ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

  ui-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  tauri-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AppImage in container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.tauri-build
          tags: kyaraben-tauri-build:latest
          load: true
          cache-from: type=gha,scope=tauri-build
          cache-to: type=gha,mode=max,scope=tauri-build

      - name: Extract AppImage from container
        run: |
          mkdir -p output
          docker run --rm -v "$(pwd)/output:/output" kyaraben-tauri-build:latest
          ls -la output/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyaraben-appimage
          path: output/*.AppImage
          if-no-files-found: error

  tauri-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build E2E test container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.tauri-e2e
          tags: kyaraben-tauri-e2e:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run E2E tests in container
        run: docker run --rm kyaraben-tauri-e2e:latest
