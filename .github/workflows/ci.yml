name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Build CLI binary for E2E tests
        run: go build -o ./kyaraben ./cmd/kyaraben

      - name: Test
        run: go test -race ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

  ui-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  electron-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build AppImage in container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.electron-build
          tags: kyaraben-electron-build:latest
          load: true
          cache-from: type=gha,scope=electron-build
          cache-to: type=gha,mode=max,scope=electron-build

      - name: Extract AppImage from container
        run: |
          mkdir -p output
          docker run --rm -v "$(pwd)/output:/output" kyaraben-electron-build:latest
          ls -la output/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyaraben-appimage
          path: output/*.AppImage
          if-no-files-found: error

  electron-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore kyaraben cache
        uses: actions/cache/restore@v4
        with:
          path: |
            kyaraben-data-cache
            kyaraben-state-cache
          key: kyaraben-cache-${{ runner.os }}-${{ hashFiles('internal/nix/flake.go') }}
          restore-keys: |
            kyaraben-cache-${{ runner.os }}-

      - name: Prepare cache directories
        run: |
          mkdir -p kyaraben-data-cache kyaraben-state-cache
          chmod 777 kyaraben-data-cache kyaraben-state-cache

      - name: Build E2E test container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile.electron-e2e
          tags: kyaraben-electron-e2e:latest
          load: true
          cache-from: type=gha,scope=electron-e2e
          cache-to: type=gha,mode=max,scope=electron-e2e

      - name: Run E2E tests in container
        run: |
          docker run --rm --ipc=host \
            -v "$(pwd)/kyaraben-data-cache:/home/testuser/.local/share/kyaraben" \
            -v "$(pwd)/kyaraben-state-cache:/home/testuser/.local/state/kyaraben" \
            kyaraben-electron-e2e:latest

      - name: Fix cache permissions
        if: always()
        run: |
          sudo chmod -R a+rX kyaraben-data-cache kyaraben-state-cache

      - name: Save kyaraben cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            kyaraben-data-cache
            kyaraben-state-cache
          key: kyaraben-cache-${{ runner.os }}-${{ hashFiles('internal/nix/flake.go') }}
