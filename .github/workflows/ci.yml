name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Build CLI binary for E2E tests
        run: go build -o ./kyaraben ./cmd/kyaraben

      - name: Build relay binary for E2E tests
        run: cd relay && go build -o ../relay-bin ./cmd/relay

      - name: Test
        run: KYARABEN_RELAY_BINARY=${{ github.workspace }}/relay-bin go test -short -race ./...

  relay-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: relay
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2
          working-directory: relay

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

  ui-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  site-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run fmt:check

      - name: Build site
        run: npm run build

  electron-e2e:
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install rpm (needed for electron-builder)
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build Go sidecar
        run: ./scripts/build-sidecar.sh

      - name: Build relay binary
        run: |
          mkdir -p .test/relay
          cd relay && go build -o ../.test/relay/relay ./cmd/relay

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build AppImage
        run: cd ui && npm run electron:build -- --linux AppImage --publish never

      - name: Extract AppImage
        run: |
          cd ui/release
          ./*.AppImage --appimage-extract
          mv squashfs-root app

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('ui/package-lock.json') }}

      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        run: |
          cd ui
          KYARABEN_APPIMAGE="$(pwd)/release/app/kyaraben-ui" \
          APPDIR="$(pwd)/release/app" \
          KYARABEN_RELAY_BINARY="$(pwd)/../.test/relay/relay" \
          xvfb-run --auto-servernum ../scripts/run-ui-e2e.sh npx playwright test
