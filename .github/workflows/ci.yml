name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        run: go build ./...

      - name: Build CLI binary for E2E tests
        run: go build -o ./kyaraben ./cmd/kyaraben

      - name: Test
        run: go test ./...

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.0.2

  ui-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  tauri-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ui/src-tauri

      - name: Install Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Go sidecar
        run: ./scripts/build-sidecar.sh

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build Tauri app
        run: cd ui && npm run tauri build

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: kyaraben-appimage
          path: ui/src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

  tauri-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build E2E test container
        run: docker build -t kyaraben-tauri-e2e -f Containerfile.tauri-e2e .

      - name: Run E2E tests in container
        run: docker run --rm kyaraben-tauri-e2e
