name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install goreleaser
        run: |
          curl -sfL https://goreleaser.com/static/run | bash -s -- --version

      - name: Run goreleaser
        run: curl -sfL https://goreleaser.com/static/run | bash -s -- release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-electron:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm musl-tools

      - name: Build Go sidecar
        run: ./scripts/build-sidecar.sh

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build AppImage
        run: cd ui && npm run electron:build -- --publish never

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" ui/release/*.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-nextui:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    defaults:
      run:
        working-directory: integrations/nextui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build NextUI paks
        run: just build-all

      - name: Create release zip
        run: |
          cd dist
          zip -r Kyaraben-NextUI-v${{ steps.version.outputs.version }}.zip Tools/

      - name: Upload to release
        run: gh release upload "v${{ steps.version.outputs.version }}" dist/Kyaraben-NextUI-v${{ steps.version.outputs.version }}.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
