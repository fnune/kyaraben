name: Release

on:
  push:
    tags: ["v*"]

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for CI to pass
        run: |
          echo "Waiting for CI workflow to complete..."
          for i in {1..60}; do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
              --jq '.check_runs | map(select(.name != "wait-for-ci")) | if length == 0 then "pending" elif all(.conclusion == "success") then "success" elif any(.conclusion == "failure") then "failure" else "pending" end')
            echo "CI status: $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "CI passed!"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "CI failed!"
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for CI"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

  release-cli:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install musl-gcc
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install goreleaser
        run: |
          curl -sfL https://goreleaser.com/static/run | bash -s -- --version

      - name: Run goreleaser
        run: curl -sfL https://goreleaser.com/static/run | bash -s -- release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-electron:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install rpm
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build Go sidecar
        run: ./scripts/build-sidecar.sh

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build and publish
        run: cd ui && npm run electron:build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-nextui:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build NextUI pak
        run: just nextui-release ${{ steps.version.outputs.version }}

      - name: Upload to release
        run: gh release upload "v${{ steps.version.outputs.version }}" integrations/nextui/dist/Kyaraben.pak.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
