name: Release

on:
  push:
    tags: ["v*"]

jobs:
  wait-for-ci:
    runs-on: ubuntu-latest
    permissions:
      checks: read
    steps:
      - name: Wait for CI to pass
        run: |
          echo "Waiting for CI workflow to complete..."
          for i in {1..60}; do
            STATUS=$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs \
              --jq '.check_runs | map(select(.name != "wait-for-ci")) | if length == 0 then "pending" elif all(.conclusion == "success") then "success" elif any(.conclusion == "failure") then "failure" else "pending" end')
            echo "CI status: $STATUS"
            if [ "$STATUS" = "success" ]; then
              echo "CI passed!"
              exit 0
            elif [ "$STATUS" = "failure" ]; then
              echo "CI failed!"
              exit 1
            fi
            sleep 10
          done
          echo "Timeout waiting for CI"
          exit 1
        env:
          GH_TOKEN: ${{ github.token }}

  release-cli:
    needs: wait-for-ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-2.7.0/git-cliff /usr/local/bin/
          rm -rf git-cliff-2.7.0

      - name: Build CLI
        run: |
          CGO_ENABLED=1 CC=musl-gcc go build \
            -ldflags="-s -w -linkmode external -extldflags '-static'" \
            -o Kyaraben-CLI-linux-amd64 \
            ./cmd/kyaraben
          sha256sum Kyaraben-CLI-linux-amd64 > checksums.txt

      - name: Create release
        run: |
          git-cliff --latest --strip header > release-notes.md
          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            Kyaraben-CLI-linux-amd64 \
            checksums.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-electron:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm musl-tools

      - name: Build Go sidecar
        run: ./scripts/build-sidecar.sh

      - name: Install UI dependencies
        run: cd ui && npm ci

      - name: Build AppImage
        run: cd ui && npm run electron:build -- --publish never

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" ui/release/*.AppImage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-nextui:
    runs-on: ubuntu-latest
    needs: release-cli
    permissions:
      contents: write
    defaults:
      run:
        working-directory: integrations/nextui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build NextUI paks
        run: just build-all

      - name: Create release zip
        run: |
          cd dist
          zip -r Kyaraben-NextUI.zip Tools/

      - name: Upload to release
        run: gh release upload "v${{ steps.version.outputs.version }}" dist/Kyaraben-NextUI.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
