repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -w
        files: \.go$
        exclude: ^\.test/
        pass_filenames: true

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --fix
        files: \.go$
        exclude: ^\.test/
        pass_filenames: false

      - id: nixpkgs-fmt
        name: nixpkgs-fmt
        language: system
        entry: nixpkgs-fmt
        files: \.nix$
        exclude: ^\.test/
        pass_filenames: true

      - id: biome
        name: biome
        language: system
        entry: sh -c 'cd ui && biome check --write "${@#ui/}"' --
        files: ^ui/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: true

      - id: prettier
        name: prettier (site markdown)
        language: system
        entry: sh -c 'cd site && npx prettier --write "${@#site/}"' --
        files: ^site/.*\.(md|mdx)$
        pass_filenames: true

      - id: strip-claude-coauthor
        name: strip Claude co-author
        language: system
        entry: sed -i '/Co-Authored-By:.*[Cc]laude\|Co-Authored-By:.*anthropic/d'
        stages: [commit-msg]
        always_run: true
