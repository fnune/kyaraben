repos:
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        language: system
        entry: gofmt -w
        files: \.go$
        exclude: ^\.sandbox/
        pass_filenames: true

      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run --fix
        files: \.go$
        exclude: ^\.sandbox/
        pass_filenames: false

      - id: nixpkgs-fmt
        name: nixpkgs-fmt
        language: system
        entry: nixpkgs-fmt
        files: \.nix$
        exclude: ^\.sandbox/
        pass_filenames: true

      - id: biome
        name: biome
        language: system
        entry: sh -c 'cd ui && biome check --write "${@#ui/}"' --
        files: ^ui/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: true
